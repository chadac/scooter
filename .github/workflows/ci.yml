name: CI

# Runs the fast check tier on every PR and on pushes to main:
#   - nix flake show          (flake evaluates)
#   - check-manifests         (example platform config renders, resources present)
#   - typecheck               (agent-host + ui)
#   - Tier 1 contract tests   (vitest, no cluster)
#   - broker + webhooks builds (their nix build runs pytest via pytestCheckHook)
#
# The KVM-backed dev-env nixosTests run as a parallel MATRIX (one job per VM
# test) below, so they finish in the time of the slowest single test rather than
# 8 serial boots.
#
# Tier 2 (cluster): a PATH-GATED k3d job (`cluster-image-boot`) runs the
# self-contained image-boot specs (sandbox-os + overlay-store) on a real cluster
# when the sandbox image / its modules / those specs change — covering the OCI
# packaging + in-pod systemd boot + the local-overlay store's PROD topology that
# the VM tests can't. The rest of Tier 2 (controller/broker/webhooks) and Tier 3
# (e2e) stay manual — see the `cluster` / `e2e` justfile recipes + docs/TESTING.md.
#
# BINARY CACHE (Cachix) — one-time setup so expensive closures (e.g. the
# scooter-module NixOS toplevel) are built ONCE and pulled across branches/PRs
# instead of rebuilt cold per branch:
#   1. Create a cache named `scooter` at https://app.cachix.org (public read).
#   2. Generate a write auth token; add it as the repo secret CACHIX_AUTH_TOKEN.
# Without the secret CI still works — cachix-action pulls read-only (no push),
# so forks/contributors are unaffected; they just don't populate the cache.

on:
  pull_request:
    # `labeled` so adding `flake-check` (or `full-nixos-tests`) to an open PR
    # re-triggers CI and runs the focused flake-repeat job below.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
  # Nightly: run the FULL nixosTest set incl. the heavy ones (see HEAVY_TESTS
  # below) that are too slow for per-PR (a ~1h from-source NixOS toplevel build).
  # Also runs the flake-detection job (the whole e2e suite, each test 5×).
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  # Manual trigger (Actions tab) — handy for running the flake-detection job on
  # demand without waiting for the nightly.
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. a force-push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: fast checks (flake + typecheck + Tier 1 + python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: nixbuild/nix-quick-install-action@v30

      # Cachix binary cache: build-once-share-everywhere across branches/PRs, so
      # an expensive closure (e.g. the scooter-module NixOS toplevel) is realised
      # ONCE and pulled thereafter rather than rebuilt cold per branch. With the
      # CACHIX_AUTH_TOKEN secret set it also PUSHES; without it (forks) it still
      # PULLS read-only. See README/docs for creating the `scooter` cache.
      - uses: cachix/cachix-action@v15
        with:
          name: scooter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # The fast `just ci` bundle, run inside the pinned dev shell (gets `just`,
      # node, npm from the flake). check-flake + check-manifests + typecheck +
      # Tier 1 vitest. CI=1 makes vitest use the default (non-verbose) reporter.
      - name: just ci (flake check, typecheck, Tier 1)
        env:
          CI: "1"
        run: nix develop --command just ci

      # broker + webhooks: their nix build runs the python test suite
      # (pytestCheckHook). Building them here gives PR coverage of the Python
      # services without a separate Python toolchain in CI.
      - name: broker + webhooks tests (nix build runs pytest)
        run: nix build .#broker .#webhooks --print-build-logs

  # Build the OCI images — REQUIRED, always-on. The `dockerTools.streamLayeredImage`
  # TAR step (which lays out the whole closure) is a distinct failure surface the
  # nixosTests never touch (they build the NixOS toplevel, not the tar) and the
  # heavier path-gated k3d boot job (`cluster-image-boot`, continue-on-error) doesn't
  # gate on. A musl/static path leaking into the layer closure via a lazy-tool `.drv`
  # broke this build while every required check stayed green (the bug that shipped in
  # #95, only caught later at deploy). So build the tar here on EVERY PR — including
  # ones that only bump a flake input (e.g. nix-stubs) — so a broken image fails the
  # PR red. Cheap-ish and Cachix-backed; no cluster needed.
  image-build:
    name: build sandbox-os images (tar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: nixbuild/nix-quick-install-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: scooter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Build BOTH image tarballs to completion (the streamLayeredImage step that
      # `os.lstat`s every layered path — where an unrealised closure member fails).
      - name: nix build .#sandbox-os-image .#sandbox-os-overlay-image
        run: nix build .#sandbox-os-image .#sandbox-os-overlay-image --print-build-logs

  # Image-size benchmark: measure every shipped image on the PR and diff it against
  # origin/main, then post a sticky PR comment with the table. A SIGNAL (report-only,
  # never fails the PR) so a closure that balloons is visible before it ships. The
  # baseline is REBUILT from origin/main in this same job — accurate + self-contained;
  # Cachix substitutes the unchanged images, so only what the PR actually changed
  # rebuilds. PR-only (needs a PR to compare against + comment on).
  image-sizes:
    name: image size benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write   # to post/update the sticky size-report comment
    steps:
      - uses: actions/checkout@v5
        with:
          # Need main's history for the worktree baseline build (origin/main).
          fetch-depth: 0
      - uses: nixbuild/nix-quick-install-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: scooter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # 1. Measure the PR's images (JSON to pr-sizes.json; build logs to stderr).
      - name: measure PR image sizes
        run: ./scripts/image-sizes.sh > pr-sizes.json

      # 2. Measure origin/main's images from a worktree — same measures, same script.
      #    Run the PR's copy of the script against main's FLAKE (copy it in, since main
      #    may predate the script — as it does on this very PR), so the baseline uses
      #    identical measurement logic. Cachix substitutes the unchanged images.
      - name: measure origin/main (baseline) image sizes
        run: |
          set -euo pipefail
          git worktree add --detach ../main-baseline origin/main
          cp scripts/image-sizes.sh ../main-baseline/image-sizes.sh
          ( cd ../main-baseline && ./image-sizes.sh ) > base-sizes.json
          git worktree remove --force ../main-baseline

      # 3. Render the comparison table and post/update the sticky PR comment.
      - name: post size report comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          ./scripts/image-sizes-diff.sh base-sizes.json pr-sizes.json 5 > report.md
          cat report.md >> "$GITHUB_STEP_SUMMARY"   # also surface it in the run summary
          # Sticky comment via the REST API (numeric comment ids, unlike the GraphQL
          # node ids `gh pr view` returns): find our prior comment by the marker and
          # PATCH it, else POST a new one.
          marker='<!-- image-size-benchmark -->'
          id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" --paginate \
                 --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n1)
          if [ -n "$id" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${id}" -X PATCH -F body=@report.md >/dev/null
            echo "updated sticky comment ${id}"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" -F body=@report.md >/dev/null
            echo "created sticky comment"
          fi

  # Enumerate the dev-env-* nixosTests into a matrix so each VM test runs in its
  # OWN parallel job. This generate job is cheap (eval only). By default the
  # HEAVY tests (a ~1h from-source NixOS toplevel build — see HEAVY_TESTS) are
  # EXCLUDED from per-PR runs; they run nightly (schedule) or when a PR carries
  # the `full-nixos-tests` label. The fast tests run on every PR.
  nixos-tests-matrix:
    name: enumerate dev-env nixosTests
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.list.outputs.tests }}
    env:
      # Tests too expensive for per-PR (space-separated check names). scooter-module
      # builds a full second nixos-system toplevel from nixos-unstable (~1h cold).
      HEAVY_TESTS: "dev-env-scooter-module"
      # Include heavy tests when: nightly schedule, OR the PR has the label.
      INCLUDE_HEAVY: ${{ github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'full-nixos-tests') }}
    steps:
      - uses: actions/checkout@v5
      - uses: nixbuild/nix-quick-install-action@v30
      - id: list
        name: list dev-env-* checks
        run: |
          set -euo pipefail
          # All dev-env-* check names.
          all=$(nix eval --json --impure --expr '
            let f = builtins.getFlake (toString ./.);
                s = builtins.currentSystem;
                names = builtins.attrNames f.checks.${s};
            in builtins.filter (n: builtins.match "dev-env-.*" n != null) names')
          if [ "$INCLUDE_HEAVY" = "true" ]; then
            tests="$all"
            echo "including heavy tests ($HEAVY_TESTS)"
          else
            # Drop the heavy ones with jq (per-PR fast path).
            tests=$(echo "$all" | jq -c --arg heavy "$HEAVY_TESTS" \
              '($heavy | split(" ")) as $h | [ .[] | select( . as $t | ($h | index($t)) | not ) ]')
            echo "excluding heavy tests ($HEAVY_TESTS) — run nightly or add the 'full-nixos-tests' label"
          fi
          echo "tests=$tests" >> "$GITHUB_OUTPUT"
          echo "matrix: $tests"

  nixos-test:
    name: nixosTest ${{ matrix.test }}
    needs: nixos-tests-matrix
    runs-on: ubuntu-latest
    # Non-required for now (continue-on-error) — promote to required once the
    # KVM-accelerated matrix is confirmed consistently green on the runner.
    continue-on-error: true
    strategy:
      fail-fast: false
      # Cap concurrent VM jobs so we don't exhaust the runner pool; each is a
      # full NixOS VM. Tune up if the org has more runner capacity.
      max-parallel: 4
      matrix:
        test: ${{ fromJSON(needs.nixos-tests-matrix.outputs.tests) }}
    steps:
      - uses: actions/checkout@v5

      # GitHub's standard Linux runners HAVE KVM hardware, but /dev/kvm ships with
      # restrictive group perms — so qemu can't open it and the nixosTest VM
      # silently falls back to TCG software emulation (~6-10x slower; this is why
      # the old serial job took ~1h). Loosen the perms so qemu uses real KVM.
      - name: enable KVM access (else qemu falls back to slow TCG)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - uses: nixbuild/nix-quick-install-action@v30

      # Cachix: the heavy bits (esp. scooter-module's NixOS toplevel closure) are
      # built once and pulled across branches/PRs — so a cold branch doesn't
      # rebuild them from source. Pushes when CACHIX_AUTH_TOKEN is set; pulls
      # read-only otherwise.
      - uses: cachix/cachix-action@v15
        with:
          name: scooter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: build ${{ matrix.test }}
        run: nix build ".#checks.x86_64-linux.${{ matrix.test }}" --print-build-logs

  # Decide whether the Tier-2 cluster job needs to run: only when the sandbox
  # image, its NixOS modules, or the image-boot cluster specs change. Most PRs
  # touch none of these and skip the (heavier) cluster job entirely.
  cluster-changes:
    name: detect sandbox-image changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.image }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            image:
              - 'pkgs/sandbox-os/**'
              - 'modules/sandbox-os/**'
              - 'pkgs/broker-tools/**'
              - 'flake.nix'
              - 'test/cluster/sandbox-os.spec.ts'
              - 'test/cluster/overlay-store.spec.ts'
              - 'test/cluster/scooter-converge.spec.ts'
              # the .scooter seed lives in the provisioner — a seed change must run the
              # k3d converge/tool-on-PATH spec too.
              - 'services/agent-host/src/session/k8sProvisioner.ts'
              - 'test/support/cluster.ts'

  # Tier-2 image-boot cluster tests on a REAL Kubernetes cluster (k3d = k3s in
  # Docker; no root, runs on the standard runner). Covers what the nixosTest VMs
  # cannot: the OCI packaging + the in-pod systemd-PID-1 boot, and the
  # local-overlay store in the PROD topology (baked store as the read-only lower).
  # Path-gated via cluster-changes; only the self-contained image-boot specs run
  # (sandbox-os + overlay-store) — no controller/broker/webhooks needed.
  cluster-image-boot:
    name: Tier-2 image boot (k3d)
    needs: cluster-changes
    if: needs.cluster-changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    # Required: this is the ONLY tier that boots the real OCI image in a pod (the prod
    # container topology — minimal PATH, the .scooter CM mount, the in-pod switch under
    # systemd cgroups). Two bugs shipped green because nothing required exercised it
    # (the sandbox-os-image musl leak; the .scooter seed/converge tool-on-PATH path). A
    # failure here now blocks the PR.
    steps:
      - uses: actions/checkout@v5
      - uses: nixbuild/nix-quick-install-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: scooter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # k3d needs Docker (present on ubuntu-latest). Get k3d + kubectl from nixpkgs.
      - name: create k3d cluster
        run: |
          nix shell nixpkgs#k3d nixpkgs#kubectl -c k3d cluster create scooter-ci --no-lb --wait
          nix shell nixpkgs#k3d -c k3d kubeconfig merge scooter-ci --kubeconfig-merge-default

      # Build both OS images (Cachix-cached), load into Docker, import into k3d by
      # NAME. We import by name (not the tarball) because dockerTools ships a
      # GZIPPED tar that ctr's importer rejects ("invalid tar header").
      - name: build + import sandbox images
        run: |
          set -euo pipefail
          for pkg in sandbox-os-image sandbox-os-overlay-image; do
            tarball=$(nix build ".#${pkg}" --no-link --print-out-paths --print-build-logs)
            docker load < "$tarball"
          done
          nix shell nixpkgs#k3d -c k3d image import \
            agent-sandbox-os:latest agent-sandbox-os-overlay:latest -c scooter-ci

      # Run ONLY the two self-contained image-boot specs against the live cluster.
      # `npm install` first (node_modules for vitest + the k8s client), inside the
      # dev shell so node/npm come from the flake.
      - name: Tier-2 image-boot specs
        env:
          RUN_CLUSTER_TESTS: "1"
          CLUSTER_PROVIDER: existing
          SANDBOX_OS_IMAGE: agent-sandbox-os:latest
          OVERLAY_IMAGE: agent-sandbox-os-overlay:latest
          CI: "1"
        # --no-file-parallelism: run the two specs SEQUENTIALLY. Each boots a
        # privileged systemd-PID-1 pod; two at once on a single-node k3d contend
        # for resources (slow boots → flaky readiness) and share the test
        # namespace. One at a time is reliable and still fast.
        run: nix develop --command bash -c 'npm install && npm run test:cluster -- sandbox-os overlay-store scooter-converge --no-file-parallelism'

      - name: tear down k3d
        if: always()
        run: nix shell nixpkgs#k3d -c k3d cluster delete scooter-ci || true

  # Tier 3 — Playwright E2E through the UI against the fake-agent stack (no
  # cluster/model). The dev shell provides the Nix-wrapped Playwright browsers
  # (playwright-driver.browsers + PLAYWRIGHT_BROWSERS_PATH), so no separate browser
  # install is needed. Runs SERIALLY (playwright.config workers:1) because the whole
  # suite shares one agent-host webServer + its persisted state; CI=1 also makes
  # Playwright start fresh servers instead of reusing whatever's on the ports.
  e2e:
    name: e2e (Playwright, fake stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: nixbuild/nix-quick-install-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: scooter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # npm install (node_modules for the workspaces + the UI). pretest:e2e builds
      # the agent-host dist the webServer runs; the UI webServer is `npm run dev`.
      - name: e2e
        env:
          CI: "1"
        run: nix develop --command bash -c 'npm install && npm run test:e2e'

      # Traces/videos/screenshots for any failure — invaluable for a flaky/broken
      # e2e without a local repro.
      - name: upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Flake detection — NIGHTLY. Run the WHOLE Playwright e2e suite with
  # --repeat-each=5: each test executes 5×, and with playwright.config retries=0
  # ANY single failure fails the job and names the flaky test. This surfaces
  # timing/ordering flakes (a dropped turn, a replay race) that a single per-PR
  # run misses. Not on PRs (5× the e2e wall-time); nightly + manual only.
  flake-nightly:
    name: flake detection (e2e ×5, nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: nixbuild/nix-quick-install-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: scooter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: e2e ×5 (report flaky)
        env:
          CI: "1"
        # --repeat-each=5 runs every test 5×; the list reporter names each failing
        # repetition. A non-zero exit = at least one repetition flaked.
        run: nix develop --command bash -c 'npm install && npm run test:e2e -- --repeat-each=5 --reporter=list'
      - name: upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flake-nightly-results
          path: test-results/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Focused flake check — PR opt-in. A PR that FIXES a specific flake adds the
  # `flake-check` label AND a structured line in its description naming the test:
  #
  #     flake-test: <playwright -g pattern>
  #
  # e.g.  flake-test: multi-turn re-render
  # This job then runs ONLY that test 20× to prove the fix holds. Gated on the
  # label so it never runs on unrelated PRs.
  flake-focus:
    name: flake focus (targeted ×20)
    if: contains(github.event.pull_request.labels.*.name, 'flake-check')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: nixbuild/nix-quick-install-action@v30
      - uses: cachix/cachix-action@v15
        with:
          name: scooter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Pull the `flake-test:` pattern out of the PR description. Fail loudly if the
      # label is set but no pattern is given (so the check can't silently pass by
      # running nothing).
      - name: resolve flake-test pattern
        id: pat
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: .github/scripts/flake-focus-pattern.sh

      - name: e2e ×20 (targeted)
        env:
          CI: "1"
          FLAKE_PATTERN: ${{ steps.pat.outputs.pattern }}
        # -g greps test titles; --repeat-each=20 hammers the match. retries=0 means
        # one failure across the 20 fails the job.
        run: nix develop --command bash -c 'npm install && npm run test:e2e -- -g "$FLAKE_PATTERN" --repeat-each=20 --reporter=list'
      - name: upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flake-focus-results
          path: test-results/
          retention-days: 14
