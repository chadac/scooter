name: CI

# Runs the fast check tier on every PR and on pushes to main:
#   - nix flake show          (flake evaluates)
#   - check-manifests         (example platform config renders, resources present)
#   - typecheck               (agent-host + ui)
#   - Tier 1 contract tests   (vitest, no cluster)
#   - broker + webhooks builds (their nix build runs pytest via pytestCheckHook)
#
# Tier 2 (cluster) and Tier 3 (e2e) are heavier and NOT run here — see the
# `cluster` / `e2e` justfile recipes and docs/TESTING.md. The KVM-backed
# dev-env nixosTests run as a parallel MATRIX (one job per VM test) below, so
# they finish in the time of the slowest single test rather than 8 serial boots.
#
# BINARY CACHE (Cachix) — one-time setup so expensive closures (e.g. the
# scooter-module NixOS toplevel) are built ONCE and pulled across branches/PRs
# instead of rebuilt cold per branch:
#   1. Create a cache named `scooter` at https://app.cachix.org (public read).
#   2. Generate a write auth token; add it as the repo secret CACHIX_AUTH_TOKEN.
# Without the secret CI still works — cachix-action pulls read-only (no push),
# so forks/contributors are unaffected; they just don't populate the cache.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. a force-push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: fast checks (flake + typecheck + Tier 1 + python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: nixbuild/nix-quick-install-action@v30

      # Cachix binary cache: build-once-share-everywhere across branches/PRs, so
      # an expensive closure (e.g. the scooter-module NixOS toplevel) is realised
      # ONCE and pulled thereafter rather than rebuilt cold per branch. With the
      # CACHIX_AUTH_TOKEN secret set it also PUSHES; without it (forks) it still
      # PULLS read-only. See README/docs for creating the `scooter` cache.
      - uses: cachix/cachix-action@v15
        with:
          name: scooter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # The fast `just ci` bundle, run inside the pinned dev shell (gets `just`,
      # node, npm from the flake). check-flake + check-manifests + typecheck +
      # Tier 1 vitest. CI=1 makes vitest use the default (non-verbose) reporter.
      - name: just ci (flake check, typecheck, Tier 1)
        env:
          CI: "1"
        run: nix develop --command just ci

      # broker + webhooks: their nix build runs the python test suite
      # (pytestCheckHook). Building them here gives PR coverage of the Python
      # services without a separate Python toolchain in CI.
      - name: broker + webhooks tests (nix build runs pytest)
        run: nix build .#broker .#webhooks --print-build-logs

  # Enumerate the dev-env-* nixosTests into a matrix so each VM test runs in its
  # OWN parallel job (8 serial VM boots took ~1h; fanned out they finish in the
  # time of the slowest single test). This generate job is cheap (eval only).
  nixos-tests-matrix:
    name: enumerate dev-env nixosTests
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.list.outputs.tests }}
    steps:
      - uses: actions/checkout@v5
      - uses: nixbuild/nix-quick-install-action@v30
      - id: list
        name: list dev-env-* checks
        run: |
          set -euo pipefail
          # JSON array of the dev-env-* check names, for the matrix below.
          tests=$(nix eval --json --impure --expr '
            let f = builtins.getFlake (toString ./.);
                s = builtins.currentSystem;
                names = builtins.attrNames f.checks.${s};
            in builtins.filter (n: builtins.match "dev-env-.*" n != null) names')
          echo "tests=$tests" >> "$GITHUB_OUTPUT"
          echo "matrix: $tests"

  nixos-test:
    name: nixosTest ${{ matrix.test }}
    needs: nixos-tests-matrix
    runs-on: ubuntu-latest
    # Non-required for now (continue-on-error) — promote to required once the
    # KVM-accelerated matrix is confirmed consistently green on the runner.
    continue-on-error: true
    strategy:
      fail-fast: false
      # Cap concurrent VM jobs so we don't exhaust the runner pool; each is a
      # full NixOS VM. Tune up if the org has more runner capacity.
      max-parallel: 4
      matrix:
        test: ${{ fromJSON(needs.nixos-tests-matrix.outputs.tests) }}
    steps:
      - uses: actions/checkout@v5

      # GitHub's standard Linux runners HAVE KVM hardware, but /dev/kvm ships with
      # restrictive group perms — so qemu can't open it and the nixosTest VM
      # silently falls back to TCG software emulation (~6-10x slower; this is why
      # the old serial job took ~1h). Loosen the perms so qemu uses real KVM.
      - name: enable KVM access (else qemu falls back to slow TCG)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - uses: nixbuild/nix-quick-install-action@v30

      # Cachix: the heavy bits (esp. scooter-module's NixOS toplevel closure) are
      # built once and pulled across branches/PRs — so a cold branch doesn't
      # rebuild them from source. Pushes when CACHIX_AUTH_TOKEN is set; pulls
      # read-only otherwise.
      - uses: cachix/cachix-action@v15
        with:
          name: scooter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: build ${{ matrix.test }}
        run: nix build ".#checks.x86_64-linux.${{ matrix.test }}" --print-build-logs
